<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Data — Human Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      --bg: #000;
      --surface: #0c0c0c;
      --border: #1c1c1c;
      --border2: #2e2e2e;
      --white: #fff;
      --gray1: #e0e0e0;
      --gray2: #a0a0a0;
      --gray3: #5a5a5a;
      --gray4: #303030;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(14px);
      z-index: 100;
    }

    .topbar-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--white);
      color: var(--bg);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.48rem 1.2rem;
      border-radius: 3px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .topbar-back:hover { opacity: 0.75; }

    .topbar-logo img {
      height: 28px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3rem;
      width: 100%;
      max-width: 580px;
    }

    .form-title {
      font-size: 2rem;
      font-weight: 300;
      color: var(--white);
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .form-subtitle {
      font-size: 0.88rem;
      color: var(--gray2);
      line-height: 1.6;
      font-weight: 300;
      margin-bottom: 2.5rem;
    }

    .field {
      margin-bottom: 1.3rem;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      color: var(--gray2);
      margin-bottom: 0.45rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--gray3);
    }

    .field textarea { height: 90px; }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--gray4);
      font-weight: 300;
    }

    .submit-btn {
      width: 100%;
      background: var(--white);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      padding: 0.9rem;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    .submit-btn:hover { opacity: 0.8; }

    .success-msg {
      display: none;
      text-align: center;
      padding: 2rem 0 1rem;
    }
    .success-msg h3 {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 0.5rem;
    }
    .success-msg p {
      font-size: 0.84rem;
      color: var(--gray2);
      font-weight: 300;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 2rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2rem;
      align-items: start;
    }

    .footer-left { display: flex; flex-direction: column; }

    .footer-logo {
      margin-bottom: 0.6rem;
    }

    .footer-logo img {
      height: 20px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.5;
      display: block;
    }

    .footer-tagline {
      font-size: 0.76rem;
      color: var(--gray3);
      font-weight: 300;
      margin-bottom: 1.4rem;
    }

    .footer-social {
      display: flex;
      gap: 0.6rem;
    }

    .footer-social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--gray3);
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .footer-social a:hover { color: var(--white); border-color: var(--gray3); }
    .footer-social svg { width: 14px; height: 14px; fill: currentColor; }

    .footer-right { display: flex; flex-direction: column; align-items: flex-end; }

    .footer-nav-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray3);
      margin-bottom: 1rem;
    }

    .footer-nav {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.7rem;
    }

    .footer-nav a {
      font-size: 0.8rem;
      color: var(--gray2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-nav a:hover { color: var(--white); }

    @media (max-width: 600px) {
      .form-card { padding: 2rem 1.5rem; }
      footer { grid-template-columns: 1fr; }
      .footer-right { align-items: flex-start; }
      .footer-nav { align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="topbar-back">← Request Data</a>
    <a href="index.html" class="topbar-logo">
      <img src="logo-wordmark.png" alt="Human Archive">
    </a>
  </div>

  <main>
    <div class="form-card">
      <h1 class="form-title">Request Data</h1>
      <p class="form-subtitle">Tell us about your data requirements<br>and we'll get back to you soon.</p>

      <form id="request-form" action="https://formspree.io/f/xlgpggra" method="POST">

        <div class="field">
          <label for="name">Name*</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>

        <div class="field">
          <label for="email">Email*</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="field">
          <label for="org">Organization*</label>
          <input type="text" id="org" name="organization" required>
        </div>

        <div class="field">
          <label for="info">Additional Information</label>
          <textarea id="info" name="additional_information" placeholder="Do modalities, use cases, Timelines, volumes and task diversity"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>

      <div class="success-msg" id="success-msg">
        <h3>Thank you — we'll be in touch.</h3>
        <p>Expect a response soon at the email you provided.</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-left">
      <div class="footer-logo">
        <img src="logo-wordmark.png" alt="Human Archive">
      </div>
      <p class="footer-tagline">Let's archive the world for embodied intelligence.</p>
      <div class="footer-social">
        <a href="https://www.linkedin.com/company/human-archive/" target="_blank" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
        <a href="https://x.com/babugi28" target="_blank" aria-label="Twitter / X">
          <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a href="mailto:team@humanarchive.ai" aria-label="Email">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </a>
      </div>
    </div>
    <div class="footer-right">
      <p class="footer-nav-label">Navigation</p>
      <nav class="footer-nav">
        <a href="index.html">Back to home page</a>
        <a href="request-data.html">Request Data</a>
        <a href="https://cal.com/human-archive-0mw2ab" target="_blank">Let's Talk</a>
      </nav>
    </div>
  </footer>

  <script>
    const form = document.getElementById('request-form');
    const successMsg = document.getElementById('success-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('.submit-btn');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { Accept: 'application/json' }
      });

      if (res.ok) {
        form.style.display = 'none';
        successMsg.style.display = 'block';
      } else {
        btn.textContent = 'Something went wrong — try again';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
